name: Scrape & Deploy

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 python-dateutil

      - name: Run scraper
        env:
          SCRAPER_USER_1: ${{ secrets.SCRAPER_USER_1 }}
          SCRAPER_PASS_1: ${{ secrets.SCRAPER_PASS_1 }}
          SCRAPER_USER_2: ${{ secrets.SCRAPER_USER_2 }}
          SCRAPER_PASS_2: ${{ secrets.SCRAPER_PASS_2 }}
        run: python scraper.py

      - name: Run Bouygues scraper
        continue-on-error: true
        env:
          BOUYGUES_USER: ${{ secrets.BOUYGUES_USER }}
          BOUYGUES_PASS: ${{ secrets.BOUYGUES_PASS }}
        run: python scraper_bouygues.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.json src/data_bouygues.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: refresh carnet [skip ci]"
            git push origin HEAD:main
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
