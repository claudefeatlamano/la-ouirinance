name: Scrape

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 python-dateutil

      - name: Run scraper
        env:
          SCRAPER_USER_1: ${{ secrets.SCRAPER_USER_1 }}
          SCRAPER_PASS_1: ${{ secrets.SCRAPER_PASS_1 }}
          SCRAPER_USER_2: ${{ secrets.SCRAPER_USER_2 }}
          SCRAPER_PASS_2: ${{ secrets.SCRAPER_PASS_2 }}
        run: python scraper.py

      - name: Run Bouygues scraper
        continue-on-error: true
        env:
          BOUYGUES_USER: ${{ secrets.BOUYGUES_USER }}
          BOUYGUES_PASS: ${{ secrets.BOUYGUES_PASS }}
        run: python scraper_bouygues.py

      - name: Update permanent archive
        run: python update_archive.py

      - name: Commit refreshed data + archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.json src/data_bouygues.json src/contracts-archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: refresh carnet + archive [skip ci]"
            git push origin HEAD:main
          fi
